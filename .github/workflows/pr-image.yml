name: Build pull-request image

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pre-checks:
    uses: ./.github/workflows/pre-checks.yml

  build:
    needs: pre-checks
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}
      IMAGE_TAR: ${{ github.event.repository.name }}-pr-${{ github.event.pull_request.number }}.tar

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}

      - name: Save image
        run: docker save $IMAGE_TAG -o $IMAGE_TAR

      - uses: actions/upload-artifact@v6
        with:
          path: ${{ env.IMAGE_TAR }}
