name: Pre-Checks

on:
  workflow_call:

jobs:
  pre-checks:
    name: Pre-Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint:check

      - name: Unit tests
        run: npm run test

      - if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          retention-days: 7
          path: |
            packages/shared/reports
            packages/server/reports
            packages/ui/reports
